<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <div>
        <h1>Imagem dinamica</h1>
        <p>Tente abrir esse site em varios dispositivos ou simplesmente aumente e diminua o tamanho do seu navegador</p>
    </div>
    <div>
        <picture>
            <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
            <source media="(max-width:1050px )" srcset="imagens/foto-m.png" type="image/png">
            <img src="imagens/foto-g.png" alt="">
        </picture>
    </div>
    <div>
        <h1>Reproduzindo audio</h1>
        <p>vamos aprender a reproduzir audios em HTML5</p>
        <audio preload="metadata" autoplay controls loop>
            <source src="midia/guanacast-33.mp3" type="audio/mp3">
            <source src="midia/guanacast-33.ogg" type="audio/ogg">
            <source src="midia/guanacast-33.wav" type="audio/wav/">
            <p>Ifelizmente seu navegador não consegue reprozir audio. <a href="midia/guanacast-33.mp3">Clique aqui para baixar o arquivo mp3</a></p>
        </audio>
    </div>
</body>
</html>
