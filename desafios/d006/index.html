<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <div>
        <h1>Tags em HTML</h1>
        <p>Em HTML5, podemos inserir itens da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag devera utilizar em cada caso</p>
    </div>
    <div>
        <ul type="square">
            <li title="Use a tag &lt;p&gt;">Parágrafo</li>
            <li title="Use a tag &lt;h1&gt;">Titulos</li>
            <li title="Use a tag &lt;img&gt;">Imagens</li>
            <li title="Use a tag &lt;abbr&gt;">Abreviações</li>
            <li title="Use a tag &lt;code&gt;">Codigo-fonte</li>
            <li title="Use a tag &lt;ol&gt;">Listas numeradas</li>
            <li title="Use a tag &lt;ul&gt;">Listas com demarcações</li>
        </ul>
    </div>
</body>
</html>
