<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Imagem flexivel</title>
</head>
<body>
    <div>
        <h1>Imagem flexivel</h1>
        <p>Voce está vendo a imagem completa? Experimente ampliar o tamanho de sua janela para aproveitar melhor experiencia.</p>
    </div>
    <div>
        <picture>
            <source media="(max-width: 790px)" srcset="imagens/paisagem-p.png" type="image/png">
            <source media="(max-width: 1250px)" srcset="imagens/paisagem-m.png" type="image/png">
            <img src="imagens/paisagem-g.png" alt="imagem de uma paisagem">
        </picture>
    </div>
</body>
</html>
